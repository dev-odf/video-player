<!DOCTYPE html>
<html>
<head>
    <title>VaaS Converter | Fix</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .box { border: 2px dashed #444; padding: 40px; cursor: pointer; background: #1a1a1a; border-radius: 10px; }
        .box:hover { border-color: #00ffcc; }
        #log { margin-top: 20px; font-size: 12px; color: #888; text-align: left; background: #000; padding: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>VaaS Video Converter</h1>
    <div class="box" onclick="document.getElementById('fileInput').click()">
        <p id="status">Click here to select your MP4 video</p>
        <input type="file" id="fileInput" accept="video/mp4" style="display: none;">
    </div>
    <div id="log">Status: Waiting for file...</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                const name = e.target.files[0].name;
                status.innerText = "Selected: " + name;
                log.innerHTML += `<div>Selected ${name}. Now you can start the conversion logic.</div>`;
            }
        };
    </script>
</body>
</html>
