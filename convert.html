<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaaS Packager Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #0f0f11; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1a1a1d; border: 1px solid #333; padding: 40px; border-radius: 15px; max-width: 450px; margin: 0 auto; }
        #status-light { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: red; margin-right: 8px; }
        .btn { background: #00ffcc; color: black; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        #log { background: black; color: #00ffcc; padding: 15px; margin-top: 20px; height: 100px; overflow-y: auto; text-align: left; font-size: 11px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h2>VaaS Packager</h2>
    <div style="margin-bottom: 20px; font-size: 13px;">
        <span id="status-light"></span> <span id="status-text">Security Headers Missing</span>
    </div>

    <input type="file" id="fileInput" accept="video/mp4" style="display: none;">
    <button class="btn" id="pickerBtn">Select MP4 Video</button>
    <button class="btn" id="loadBtn" style="background: #555; color: white; margin-top: 10px;">Load Engine</button>
    
    <div id="log">Waiting for user...</div>
</div>

<script>
    const { FFmpeg } = window.FFmpeg;
    const { fetchFile, toBlobURL } = window.FFmpegUtil;
    let ffmpeg = null;

    // Check for Security Headers immediately
    if (self.crossOriginIsolated) {
        document.getElementById('status-light').style.background = '#00ffcc';
        document.getElementById('status-text').innerText = 'Security Check Passed';
    }

    // Fixed File Picker
    document.getElementById('pickerBtn').onclick = () => document.getElementById('fileInput').click();
    
    document.getElementById('fileInput').onchange = (e) => {
        if(e.target.files[0]) document.getElementById('log').innerText = "Selected: " + e.target.files[0].name;
    };

    document.getElementById('loadBtn').onclick = async () => {
        const log = document.getElementById('log');
        log.innerText = "Loading Engine...";
        try {
            ffmpeg = new FFmpeg();
            const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            log.innerText = "Engine Ready! Now select a file and convert.";
            document.getElementById('loadBtn').innerText = "Start Conversion";
            document.getElementById('loadBtn').onclick = runConversion;
        } catch (e) {
            log.innerText = "Error: Browser security blocked FFmpeg. Use Cloudflare with _headers file.";
        }
    };

    async function runConversion() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Select a file first!");
        
        document.getElementById('log').innerText = "Processing... this will take a minute.";
        await ffmpeg.writeFile('input.mp4', await fetchFile(file));
        await ffmpeg.exec(['-i', 'input.mp4', '-codec', 'copy', '-start_number', '0', '-hls_time', '10', '-f', 'hls', 'master.m3u8']);
        
        const zip = new JSZip();
        const files = await ffmpeg.listDir('.');
        for (const f of files) {
            if (f.name.endsWith('.m3u8') || f.name.endsWith('.ts')) {
                zip.file(f.name, await ffmpeg.readFile(f.name));
            }
        }
        const blob = await zip.generateAsync({type: "blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "video_package.zip";
        link.click();
        document.getElementById('log').innerText = "Done! Zip downloaded.";
    }
</script>

</body>
</html>
