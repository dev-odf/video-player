<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaaS | Professional HLS Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { --accent: #00ffcc; --bg: #0f0f11; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .card { background: #1a1a1d; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 600px; text-align: center; }
        h1 { color: var(--accent); margin-top: 0; }
        .drop-zone { border: 2px dashed #444; padding: 40px; border-radius: 8px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(0, 255, 204, 0.05); }
        .btn { background: var(--accent); color: #000; padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #log { margin-top: 20px; background: #000; padding: 15px; border-radius: 6px; height: 150px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 12px; color: #aaa; border: 1px solid #222; }
        .progress-container { width: 100%; background: #222; height: 8px; border-radius: 4px; margin: 15px 0; display: none; }
        .progress-bar { width: 0%; background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="card">
        <h1>VaaS Converter</h1>
        <p>Convert 1080p MP4 to Multi-Quality HLS (.m3u8)</p>
        
        <div class="drop-zone" id="dropZone">
            <p id="fileName">Click or Drag MP4 here</p>
            <input type="file" id="fileInput" accept="video/mp4" style="display: none;">
        </div>

        <div class="progress-container" id="progContainer">
            <div class="progress-bar" id="progBar"></div>
        </div>

        <button class="btn" id="startBtn">Initialize Engine</button>
        
        <div id="log">System ready...</div>
    </div>

    <script>
        const { FFmpeg } = window.FFmpeg;
        const { fetchFile, toBlobURL } = window.FFmpegUtil;
        
        let ffmpeg = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const logEl = document.getElementById('log');
        const progBar = document.getElementById('progBar');
        const progContainer = document.getElementById('progContainer');

        function log(msg) {
            logEl.innerHTML += `<div>> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 1. Initialize Engine
        startBtn.onclick = async () => {
            if (!ffmpeg) {
                startBtn.disabled = true;
                log("Loading FFmpeg Core (30MB)...");
                ffmpeg = new FFmpeg();
                
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
                
                log("Engine Ready.");
                startBtn.innerText = "Start Conversion";
                startBtn.disabled = false;
                return;
            }

            if (fileInput.files.length === 0) return alert("Please select a video!");
            runConversion();
        };

        async function runConversion() {
            startBtn.disabled = true;
            progContainer.style.display = 'block';
            const file = fileInput.files[0];
            
            log("Writing file to Virtual Memory...");
            await ffmpeg.writeFile('input.mp4', await fetchFile(file));

            log("Starting Multi-Quality Transcode...");
            log("This uses your CPU. Keep this tab open.");

            // COMMAND: 
            // We create 720p and 360p versions in one go
            // Then we chop them into 5-second segments
            await ffmpeg.exec([
                '-i', 'input.mp4',
                '-map', '0:v', '-map', '0:a', '-map', '0:v', '-map', '0:a',
                '-s:v:0', '1280x720', '-c:v:0', 'libx264', '-b:v:0', '2000k',
                '-s:v:1', '640x360', '-c:v:1', 'libx264', '-b:v:1', '800k',
                '-c:a', 'aac', '-ar', '48000',
                '-f', 'hls',
                '-hls_time', '5',
                '-hls_playlist_type', 'vod',
                '-master_pl_name', 'master.m3u8',
                '-var_stream_map', 'v:0,a:0 v:1,a:1',
                'stream_%v.m3u8'
            ]);

            log("Conversion Finished! Zipping files...");
            
            const zip = new JSZip();
            const files = await ffmpeg.listDir('.');
            
            for (const f of files) {
                if (f.name.endsWith('.m3u8') || f.name.endsWith('.ts')) {
                    const data = await ffmpeg.readFile(f.name);
                    zip.file(f.name, data);
                }
            }

            const content = await zip.generateAsync({type: "blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = "hls_package.zip";
            a.click();

            log("Download started. Upload these files to your server.");
            startBtn.disabled = false;
        }

        // File Selection Logic
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            document.getElementById('fileName').innerText = e.target.files[0].name;
        };
    </script>
</body>
</html>
