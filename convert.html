<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaaS | HLS Zip Packager</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { --accent: #00ffcc; --bg: #0f0f11; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a1d; padding: 40px; border-radius: 16px; border: 1px solid #333; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); margin-bottom: 10px; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        /* The UI for the File Picker */
        .file-selector { border: 2px dashed #444; padding: 30px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; background: #222; margin-bottom: 20px; position: relative; }
        .file-selector:hover { border-color: var(--accent); background: #2a2a2d; }
        .file-selector.active { border-color: var(--accent); background: rgba(0, 255, 204, 0.1); }
        
        .btn { background: var(--accent); color: #000; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }
        
        #log { margin-top: 25px; background: #000; padding: 15px; border-radius: 8px; height: 120px; overflow-y: auto; text-align: left; font-family: 'Courier New', monospace; font-size: 11px; color: #00ffcc; border: 1px solid #222; }
        input[type="file"] { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>VaaS Packager</h1>
        <p>Package MP4 into a Multi-Quality HLS ZIP</p>
        
        <label for="fileInput" class="file-selector" id="dropZone">
            <strong id="displayFileName">Click to select MP4 video</strong>
            <br><span style="font-size: 11px;">(Standard 1080p MP4 recommended)</span>
            <input type="file" id="fileInput" accept="video/mp4">
        </label>

        <button class="btn" id="mainBtn">1. Load Video Engine</button>
        
        <div id="log">Status: System idle.</div>
    </div>

    <script>
        const { FFmpeg } = window.FFmpeg;
        const { fetchFile, toBlobURL } = window.FFmpegUtil;
        
        let ffmpeg = null;
        const mainBtn = document.getElementById('mainBtn');
        const fileInput = document.getElementById('fileInput');
        const logEl = document.getElementById('log');
        const displayFileName = document.getElementById('displayFileName');
        const dropZone = document.getElementById('dropZone');

        function updateLog(msg) {
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Handle File Selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                displayFileName.innerText = file.name;
                dropZone.classList.add('active');
                updateLog(`File selected: ${file.name}`);
            }
        });

        // Main Logic
        mainBtn.onclick = async () => {
            // STEP 1: LOAD ENGINE
            if (!ffmpeg) {
                mainBtn.disabled = true;
                updateLog("Loading FFmpeg Core (approx. 30MB)...");
                
                try {
                    ffmpeg = new FFmpeg();
                    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                    await ffmpeg.load({
                        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                    });
                    
                    updateLog("Engine Loaded Successfully.");
                    mainBtn.innerText = "2. Generate ZIP Package";
                    mainBtn.disabled = false;
                } catch (err) {
                    updateLog("CRITICAL ERROR: Browser blocked the engine.");
                    updateLog("Tip: Ensure you are using HTTPS and have COOP/COEP headers.");
                    console.error(err);
                }
                return;
            }

            // STEP 2: CONVERT
            const file = fileInput.files[0];
            if (!file) {
                alert("Please select a video file first!");
                return;
            }

            mainBtn.disabled = true;
            mainBtn.innerText = "Processing... (Please Wait)";
            
            updateLog("Reading video data into memory...");
            await ffmpeg.writeFile('input.mp4', await fetchFile(file));

            updateLog("Transcoding to HLS (720p & 360p)...");
            updateLog("This will take 1-5 minutes depending on your PC.");

            try {
                await ffmpeg.exec([
                    '-i', 'input.mp4',
                    '-map', '0:v', '-map', '0:a', '-map', '0:v', '-map', '0:a',
                    '-s:v:0', '1280x720', '-c:v:0', 'libx264', '-b:v:0', '1500k',
                    '-s:v:1', '640x360', '-c:v:1', 'libx264', '-b:v:1', '600k',
                    '-c:a', 'aac', '-f', 'hls',
                    '-hls_time', '6',
                    '-hls_playlist_type', 'vod',
                    '-master_pl_name', 'master.m3u8',
                    '-var_stream_map', 'v:0,a:0 v:1,a:1',
                    'stream_%v.m3u8'
                ]);

                updateLog("Finalizing ZIP archive...");
                const zip = new JSZip();
                const files = await ffmpeg.listDir('.');
                
                let fileCount = 0;
                for (const f of files) {
                    if (f.name.endsWith('.m3u8') || f.name.endsWith('.ts')) {
                        const data = await ffmpeg.readFile(f.name);
                        zip.file(f.name, data);
                        fileCount++;
                    }
                }

                updateLog(`Bundled ${fileCount} files into package.`);
                const content = await zip.generateAsync({type: "blob"});
                const url = URL.createObjectURL(content);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = "video_package.zip";
                link.click();

                updateLog("SUCCESS: video_package.zip downloaded.");
                mainBtn.innerText = "Conversion Complete!";
            } catch (error) {
                updateLog("TRANSCODE ERROR: Check console for details.");
                console.error(error);
                mainBtn.disabled = false;
                mainBtn.innerText = "Try Again";
            }
        };
    </script>
</body>
</html>
